<ion-header>
  <ion-toolbar color="warning">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card *ngIf="character" mode="ios" class="simpson-detail-card">
    
    <div class="img-container ion-text-center">
      <img [src]="character.Imagen" [alt]="character.Nombre" class="character-img" />
    </div>

    <ion-card-header>
      <ion-card-subtitle class="character-occupation">{{ character.Ocupacion }}</ion-card-subtitle>
      <ion-card-title class="character-name">{{ character.Nombre }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p class="character-history">
        {{ character.Historia }}
      </p>
    </ion-card-content>
  </ion-card>
</ion-content>
