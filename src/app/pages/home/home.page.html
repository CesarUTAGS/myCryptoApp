<ion-header [translucent]="true">
  <ion-toolbar color="warning">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Los Simpson</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let item of characters" (click)="verDetalle(item)" button="true" detail="true">
      <ion-avatar slot="start">
        <img [src]="item.Imagen" [alt]="item.Nombre" />
      </ion-avatar>
      <ion-label>
        <h2>{{ item.Nombre }}</h2>
        <p>{{ item.Ocupacion }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
