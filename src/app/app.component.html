<ion-app>
  <ion-menu contentId="main-content" type="overlay">
    <ion-header>
      <ion-toolbar color="warning">
        <ion-title>Explora Springfield</ion-title>
      </ion-toolbar>
    </ion-header>
    
    <ion-content>
      <ion-list lines="none">
        <ion-menu-toggle auto-hide="false">
          
          <ion-item routerLink="/home" routerDirection="root">
            <ion-icon slot="start" name="home-outline"></ion-icon>
            <ion-label>Inicio</ion-label>
          </ion-item>
          
          <ion-item routerLink="/profile" routerDirection="root">
            <ion-icon slot="start" name="person-outline"></ion-icon>
            <ion-label>Mi Perfil</ion-label>
          </ion-item>
          
          <ion-item routerLink="/about" routerDirection="root">
            <ion-icon slot="start" name="info-icon"></ion-icon>
            <ion-label>Acerca de</ion-label>
          </ion-item>

          <ion-item routerLink="/login" routerDirection="root">
            <ion-icon slot="start" name="logout-icon" color="danger"></ion-icon>
            <ion-label color="danger">Salir</ion-label>
          </ion-item>

        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>
